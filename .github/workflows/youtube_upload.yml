name: YouTube Agent Upload

on:
  schedule:
    # Run at 9:00 AM UTC daily
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub web/mobile UI

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib gtts moviepy pytrends

      - name: Run YouTube Agent
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python youtube_agent.py
