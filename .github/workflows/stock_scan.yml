name: Stock Scan Agent

on:
  schedule:
    # Run every hour, Monday to Friday (market days)
    - cron: '0 * * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub web/mobile UI

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas-ta requests schedule

      - name: Run Stock Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_agent.py
